<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Test</title>

    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgcng9IjQwIiBmaWxsPSIjZTM0YzI2Ii8+PHRleHQgeD0iMTAwIiB5PSIxMjAiIGZvbnQtZmFtaWx5PSJIZWx2ZXRpY2EsIEFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjQ4IiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkhUTUw8L3RleHQ+PC9zdmc+">
    <meta name="theme-color" content="#e34c26">

    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #f4f4f9; 
        }
        textarea { 
            width: 100%; 
            height: 350px; 
            font-family: monospace; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
        }
        .btn-row { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); 
            gap: 10px; 
        }
        button { 
            padding: 15px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            color: white; 
        }
        button:active { opacity: 0.85; transform: scale(0.98); }

        /* Color-coded buttons */
        #btn-paste       { background: #1e293b; }   /* Black / Dark Slate */
        #btn-copy        { background: #64748b; }   /* Slate */
        #btn-run         { background: #2563eb; }   /* Blue */
        #btn-paste-run   { background: #16a34a; }   /* Green */
        #btn-download    { background: #9333ea; }   /* Purple */
        #btn-show-icon   { background: #ea580c; }   /* Orange */

        #icon-result {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            min-height: 80px;
        }
        #icon-result img {
            max-width: 128px;
            max-height: 128px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
        }
        #icon-result p {
            color: #666;
            margin: 0;
            align-self: center;
        }
    </style>
</head>
<body>

    <h2>Code Runner</h2>
    <textarea id="codeWindow" placeholder="Paste HTML here..."></textarea>
    
    <div class="btn-row">
        <button id="btn-paste" onclick="pasteClipboard()">Paste</button>
        <button id="btn-copy" onclick="copyToClipboard()">Copy</button>
        <button id="btn-run" onclick="runTest()">Run</button>
        <button id="btn-paste-run" onclick="pasteAndRun()">Paste + Run</button>
        <button id="btn-download" onclick="downloadFile()">Download</button>
        <button id="btn-show-icon" onclick="showIcon()">Show Icon</button>
    </div>

    <!-- Result area for icons -->
    <div id="icon-result" style="display: none;">
        <strong>Found Bookmark Icons:</strong>
    </div>

    <script>
        const codeWindow = document.getElementById('codeWindow');
        const iconResult = document.getElementById('icon-result');

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                codeWindow.value = text;
            } catch (err) {
                alert("Permission denied. Ensure you've clicked 'Allow' for clipboard access.");
            }
        }

        function copyToClipboard() {
            codeWindow.select();
            document.execCommand('copy');
            alert("Code copied to clipboard!");
        }

        function downloadFile() {
            const content = codeWindow.value;
            if (!content.trim()) { alert("The window is empty!"); return; }

            const titleMatch = content.match(/<title>(.*?)<\/title>/i);
            const title = titleMatch ? titleMatch[1].trim().replace(/\s+/g, '_') : 'code';
            
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const timestamp = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
            
            const fileName = `${title}_${timestamp}.html`;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function runTest() {
            const htmlContent = codeWindow.value;
            if (!htmlContent.trim()) { alert("The window is empty!"); return; }
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        async function pasteAndRun() {
            codeWindow.value = '';
            await pasteClipboard();
            runTest();
        }

        function showIcon() {
            const htmlContent = codeWindow.value.trim();
            if (!htmlContent) {
                alert("The code window is empty!");
                return;
            }

            // Clear previous results
            iconResult.innerHTML = `<strong>Found Bookmark Icons:</strong>`;
            iconResult.style.display = 'flex';

            // Parse the HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlContent, 'text/html');
            
            // Find all icon-related link tags
            const iconLinks = doc.querySelectorAll('link[rel*="icon"], link[rel="apple-touch-icon"], link[rel="shortcut icon"], link[rel="mask-icon"]');
            
            if (iconLinks.length === 0) {
                iconResult.innerHTML += `<p style="color: #e11d48;">No bookmark / touch icon found.</p>`;
                return;
            }

            iconLinks.forEach(link => {
                const href = link.getAttribute('href');
                const rel = link.getAttribute('rel');
                const sizes = link.getAttribute('sizes') || '—';

                if (href) {
                    const container = document.createElement('div');
                    container.style.textAlign = 'center';
                    
                    const img = document.createElement('img');
                    img.src = href;
                    img.alt = rel;
                    img.title = `${rel} (${sizes})`;

                    const label = document.createElement('small');
                    label.textContent = rel;
                    label.style.display = 'block';
                    label.style.marginTop = '5px';

                    container.appendChild(img);
                    container.appendChild(label);
                    iconResult.appendChild(container);
                }
            });
        }
    </script>
</body>
</html>
