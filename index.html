<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="HTML-test.png" type="image/png">
<link rel="apple-touch-icon" href="HTML-test.png">
        <title>HTML Test</title>
    <meta name="theme-color" content="#e34c26">

    <style>
        body { 
            font-family: -apple-system, sans-serif;
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #f4f4f9;
            align-items: center; /* Centers elements horizontally */
        }
        h2 {
            width: 100%;
            max-width: 600px;
            margin-bottom: 0;
        }
        textarea { 
            width: 100%;
            max-width: 600px; /* Limits width so it doesn't span too wide */
            height: 260px;    /* Moderately sized height (longer than 200px, shorter than 350px) */
            font-family: monospace; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .btn-row { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); 
            gap: 10px; 
            width: 100%;
            max-width: 600px;
        }
        button, .file-label { 
            font-family: -apple-system, sans-serif;
            font-size: 13.3333px; 
            font-weight: bold; 
            padding: 15px;
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        button:active, .file-label:active { 
            opacity: 0.85; 
            transform: scale(0.98);
        }

        /* Color-coded buttons */
        #btn-paste       { background: #1e293b; }   /* Black / Dark Slate */
        #btn-clear       { background: #ef4444; }   /* Red */
        #btn-paste-run   { background: #16a34a; }   /* Green */
        #btn-copy        { background: #64748b; }   /* Slate */
        #btn-download    { background: #9333ea; }   /* Purple */
        .file-label      { background: #475569; }   /* Medium Slate for Upload */
        #btn-run         { background: #2563eb; }   /* Blue */
        #btn-preview     { background: #0ea5e9; }   /* Sky Blue - for Preview */

        #icon-result {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            min-height: 80px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        #icon-result img {
            max-width: 128px;
            max-height: 128px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
        }
        #icon-result p {
            color: #666;
            margin: 0;
            align-self: center;
        }

        #preview-container {
            width: 100%;
            max-width: 600px;
            border: 2px solid #0ea5e9;
            border-radius: 8px;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            gap: 8px;
        }
        #preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #preview-frame {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <h2>Code Runner</h2>
    <textarea id="codeWindow" placeholder="Paste HTML here..."></textarea>
    
    <div class="btn-row">
        <button id="btn-paste" onclick="pasteClipboard()">Paste</button>
        <button id="btn-clear" onclick="clearWindow()">Clear</button>
        <button id="btn-paste-run" onclick="pasteAndRun()">Paste + Run</button>
        <button id="btn-copy" onclick="copyToClipboard()">Copy</button>
        
        <label for="fileInput" class="file-label">Upload</label>
        <input type="file" id="fileInput" accept=".html,.txt" onchange="loadLocalFile(this)">
        
        <button id="btn-download" onclick="downloadFile()">Download</button>
        <button id="btn-run" onclick="runTest()">Run</button>
        <button id="btn-preview" onclick="showInlinePreview()">Preview</button>
    </div>

    <div id="preview-container">
        <div id="preview-header">
            <strong>Inline Preview</strong>
            <button onclick="hideInlinePreview()" style="background:#ef4444; color:white; padding:6px 12px; font-size:13px; border:none; border-radius:6px; cursor:pointer;">Close Preview</button>
        </div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-popups allow-forms"></iframe>
    </div>

    <div id="icon-result" style="display: none;">
        <strong>Found Bookmark Icons:</strong>
    </div>

    <script>
        const codeWindow = document.getElementById('codeWindow');
        const iconResult = document.getElementById('icon-result');
        let currentPreviewUrl = null;

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                codeWindow.value = text;
            } catch (err) {
                alert("Permission denied. Ensure you've clicked 'Allow' for clipboard access.");
            }
        }

        function copyToClipboard() {
            codeWindow.select();
            document.execCommand('copy');
            alert("Code copied to clipboard!");
        }

        function loadLocalFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                codeWindow.value = e.target.result;
                runTest();
                input.value = '';
            };
            reader.readAsText(file);
        }

        function downloadFile() {
            const content = codeWindow.value;
            if (!content.trim()) { alert("The window is empty!"); return; }

            const titleMatch = content.match(/<title>(.*?)<\/title>/i);
            const title = titleMatch ? titleMatch[1].trim().replace(/\s+/g, '_') : 'code';
            
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const timestamp = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
            
            const fileName = `${title}_${timestamp}.html`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function runTest() {
            const htmlContent = codeWindow.value;
            if (!htmlContent.trim()) { alert("The window is empty!"); return; }
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        async function pasteAndRun() {
            codeWindow.value = '';
            await pasteClipboard();
            runTest();
        }

        function clearWindow() {
            if (confirm("Clear the entire code window?")) {
                codeWindow.value = '';
            }
        }

        function showInlinePreview() {
            const htmlContent = codeWindow.value.trim();
            if (!htmlContent) {
                alert("The window is empty!");
                return;
            }

            // Clean up previous URL if exists
            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
            }

            const blob = new Blob([htmlContent], { type: 'text/html' });
            currentPreviewUrl = URL.createObjectURL(blob);
            
            const iframe = document.getElementById('preview-frame');
            const container = document.getElementById('preview-container');
            
            iframe.src = currentPreviewUrl;
            container.style.display = 'flex';
        }

        function hideInlinePreview() {
            const container = document.getElementById('preview-container');
            const iframe = document.getElementById('preview-frame');
            
            container.style.display = 'none';
            iframe.src = '';
            
            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = null;
            }
        }
    </script>
</body>
</html>
